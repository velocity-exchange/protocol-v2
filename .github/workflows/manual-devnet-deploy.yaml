name: Manual Devnet Program Deploy

# Devnet deploys are manual-only — pick the program + source branch from the
# Actions tab. The workflow proposes a Squads upgrade on the devnet multisig;
# a multisig signer still has to approve + execute it.

on:
  workflow_dispatch:
    inputs:
      program:
        description: "Program to deploy"
        required: true
        type: choice
        default: drift
        options:
          - drift
          - token_faucet
      branch:
        description: "Branch (or ref) to build from"
        required: true
        default: master
        type: string

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: 1.91.1
  SOLANA_VERSION: 2.3.11
  ANCHOR_VERSION: 1.0.0
  NODE_VERSION: "24.x.x"
  VERIFIABLE_BUILD_IMAGE: solanafoundation/solana-verifiable-build:2.3.11
  DRIFT_DEVNET_PROGRAM_ID: vELoC1audYbSYVRXn1vPaV8Axoa9oU6BYmNGZZBDZ1P
  TOKEN_FAUCET_DEVNET_PROGRAM_ID: V4v1mQiAdLz4qwckEb45WqHYceYizoib39cDBHSWfaB

jobs:
  deploy:
    name: Build + propose devnet upgrade
    runs-on: ubicloud
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.branch }}

      - name: Resolve program id
        id: pid
        run: |
          set -euo pipefail
          case "${{ inputs.program }}" in
            drift)        PID="${{ env.DRIFT_DEVNET_PROGRAM_ID }}" ;;
            token_faucet) PID="${{ env.TOKEN_FAUCET_DEVNET_PROGRAM_ID }}" ;;
            *) echo "Unknown program '${{ inputs.program }}'" >&2; exit 1 ;;
          esac
          echo "program-id=$PID" >> "$GITHUB_OUTPUT"

      - name: Build (devnet)
        uses: ./.github/actions/build-program/
        with:
          program: ${{ inputs.program }}
          devnet: "true"

      - name: Buffer deploy (devnet)
        id: buffer-deploy
        uses: ./.github/actions/buffer-deploy/
        with:
          program: ${{ inputs.program }}
          rpc-url: ${{ secrets.DEVNET_RPC_ENDPOINT }}
          keypair: ${{ secrets.DEVNET_DEPLOYER_KEYPAIR }}
          buffer-authority: ${{ secrets.DEVNET_MULTISIG_VAULT }}

      - name: Propose Squads upgrade
        uses: helium/squads-program-upgrade@v4.0.0
        with:
          network-url: ${{ secrets.DEVNET_RPC_ENDPOINT }}
          program-multisig: ${{ secrets.DEVNET_MULTISIG }}
          program-id: ${{ steps.pid.outputs.program-id }}
          buffer: ${{ steps.buffer-deploy.outputs.buffer }}
          idl-buffer: ${{ steps.buffer-deploy.outputs.idl-buffer }}
          spill-address: ${{ secrets.DEVNET_DEPLOYER_ADDRESS }}
          authority: ${{ secrets.DEVNET_MULTISIG_VAULT }}
          name: "Deploy ${{ inputs.program }} (devnet, ${{ inputs.branch }})"
          keypair: ${{ secrets.DEVNET_DEPLOYER_KEYPAIR }}
