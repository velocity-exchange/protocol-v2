name: Release Program to Mainnet

# Mainnet program upgrades are gated by a `program-drift-<version>` tag.
# The workflow only PROPOSES the Squads transaction; multisig signers must
# approve + execute via the Squads UI.

on:
  push:
    tags:
      - "program-drift-*"

permissions:
  contents: write   # needed to attach the IDL JSON to the GitHub release

env:
  RUST_TOOLCHAIN: 1.91.1
  SOLANA_VERSION: 2.3.11
  ANCHOR_VERSION: 1.0.0
  NODE_VERSION: "24.x.x"
  VERIFIABLE_BUILD_IMAGE: solanafoundation/solana-verifiable-build:v2.3.11
  DRIFT_MAINNET_PROGRAM_ID: dRiftyHA39MWEi3m9aunc5MzRF1JYuBsbn6VPcn33UH

jobs:
  release:
    name: Build + propose mainnet upgrade
    runs-on: ubicloud
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Parse tag
        id: tag
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF#refs/tags/}
          # program-drift-<version>
          VERSION=$(echo "$TAG" | sed 's/^program-drift-//')
          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
            echo "Tag '$TAG' does not match program-drift-<version>" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build drift (mainnet)
        uses: ./.github/actions/build-program/
        with:
          program: drift
          devnet: "false"

      - name: Attach IDL to GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: target/idl/drift.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Buffer deploy (mainnet)
        id: buffer-deploy
        uses: ./.github/actions/buffer-deploy/
        with:
          program: drift
          rpc-url: ${{ secrets.MAINNET_RPC_ENDPOINT }}
          keypair: ${{ secrets.MAINNET_DEPLOYER_KEYPAIR }}
          buffer-authority: ${{ secrets.MAINNET_MULTISIG_VAULT }}

      - name: Propose Squads upgrade
        uses: helium/squads-program-upgrade@v4.0.0
        with:
          network-url: ${{ secrets.MAINNET_RPC_ENDPOINT }}
          program-multisig: ${{ secrets.MAINNET_MULTISIG }}
          program-id: ${{ env.DRIFT_MAINNET_PROGRAM_ID }}
          buffer: ${{ steps.buffer-deploy.outputs.buffer }}
          idl-buffer: ${{ steps.buffer-deploy.outputs.idl-buffer }}
          spill-address: ${{ secrets.MAINNET_DEPLOYER_ADDRESS }}
          authority: ${{ secrets.MAINNET_MULTISIG_VAULT }}
          name: "Deploy drift ${{ steps.tag.outputs.version }}"
          keypair: ${{ secrets.MAINNET_DEPLOYER_KEYPAIR }}
